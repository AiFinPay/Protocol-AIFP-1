name: RFC / AIP Proposal
description: Propose a protocol-level change through the AIFP Improvement Proposal process.
title: "aip: "
labels: [aip, protocol, triage]
body:
  - type: markdown
    attributes:
      value: |
        Protocol behavior changes require an AIP before implementation.
  - type: input
    id: title
    attributes:
      label: Proposal title
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
    validations:
      required: true
  - type: textarea
    id: specification
    attributes:
      label: Specification summary
      description: Describe the normative behavior change.
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Backward compatibility and migration
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security considerations
    validations:
      required: true
  - type: textarea
    id: affected
    attributes:
      label: Affected documents and artifacts
      placeholder: docs/aifp/01..., OpenAPI, schemas, SDKs, examples
