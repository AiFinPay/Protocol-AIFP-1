name: Question
description: Ask a usage or implementation question.
title: "question: "
labels: [question]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
    validations:
      required: true
  - type: dropdown
    id: role
    attributes:
      label: Your role
      options:
        - Merchant integrator
        - Agent developer
        - Wallet/platform developer
        - Protocol implementer
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include endpoint, SDK, protocol version, or docs page when relevant.
