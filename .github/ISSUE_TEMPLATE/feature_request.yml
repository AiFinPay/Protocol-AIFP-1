name: Feature Request
description: Suggest a developer experience, docs, SDK, or tooling improvement.
title: "feat: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or developer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: protocol-impact
    attributes:
      label: Does this change protocol behavior?
      options:
        - "No"
        - "Maybe"
        - "Yes, requires AIP"
    validations:
      required: true
