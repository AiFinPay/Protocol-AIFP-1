name: Link Check

on:
  pull_request:
  workflow_dispatch:

jobs:
  links:
    name: Markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check local Markdown links
        run: |
          python - <<'PY'
          from pathlib import Path
          import re, sys
          root = Path('.')
          missing = []
          for md in root.rglob('*.md'):
              text = md.read_text(encoding='utf-8')
              for target in re.findall(r'\[[^\]]+\]\(([^)]+)\)', text):
                  if target.startswith(('http://','https://','mailto:','#')):
                      continue
                  if target.startswith('assets/') and md.name == 'README.md':
                      path = root / target.split('#',1)[0]
                  else:
                      path = (md.parent / target.split('#',1)[0]).resolve()
                  if target and not path.exists():
                      missing.append(f'{md}: {target}')
          if missing:
              print('\n'.join(missing))
              sys.exit(1)
          PY
