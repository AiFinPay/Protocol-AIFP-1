name: docs

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify canonical docs exist
        run: |
          test -f docs/aifp/01-AIFP-1-RFC-Payment-Protocol-Specification.md
          test -f docs/aifp/08-OpenAPI-3.1-Specification.yaml
          test -f docs/aifp/09-Postman-Collection.json
          test -f docs/aifp/10-JSON-Schemas.md
      - name: Check current pricing markers
        run: |
          ! grep -R "\$0\.01\|\$0\.04\|\$0\.08\|0\.3%\|0\.6%\|0\.9%\|complexity" --include='*.md' --include='*.json' --include='*.yaml' .
