name: schemas

on:
  pull_request:
  push:
    branches: [main]

jobs:
  schema-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify schema document contains pricing contract
        run: |
          grep -q "pricing_tier" docs/aifp/10-JSON-Schemas.md
          grep -q "protocolFeeRate" docs/aifp/10-JSON-Schemas.md
          grep -q "merchantSettlementRate" docs/aifp/10-JSON-Schemas.md
