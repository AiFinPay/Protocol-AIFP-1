name: openapi

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate OpenAPI 3.1 syntax
        run: npx --yes @redocly/cli lint docs/aifp/08-OpenAPI-3.1-Specification.yaml
